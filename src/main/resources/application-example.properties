# --- Local file (recommended) ---
# Copy application-local.properties.example to application-local.properties in
# src/main/resources/ (or create ./application-local.properties at the repo root).
# Fill in JDBC URL (include ?prepareThreshold=0 for pooler port 6543), user, password, issuer.
#
# --- Or use environment variables ---
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
#   SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=https://<project-ref>.supabase.co/auth/v1
#   (JWT issuer is not read from SUPABASE_ISSUER_URI unless profile prod is active.)
#
# Running mvn spring-boot:run without datasource + JWT config (local file or env above) will fail.
#
# --- Railway (production) ---
# Set these in the Railway service variables (do not commit values):
#
#   SPRING_PROFILES_ACTIVE=prod
#
#   SPRING_DATASOURCE_URL=jdbc:postgresql://<host>:6543/postgres?prepareThreshold=0
#   SPRING_DATASOURCE_USERNAME=<pooler user, e.g. postgres.<project_ref>>
#   SPRING_DATASOURCE_PASSWORD=<db password>
#
#   SUPABASE_ISSUER_URI=https://<project-ref>.supabase.co/auth/v1
#
# PORT is set by Railway; server.port reads it via application-prod.properties.
#
# Transaction pooler (6543) needs prepareThreshold=0 on the JDBC URL or the driver
# can fail with prepared statement errors.
#
# --- Local (no Railway) ---
# Option A — file: create ./application-local.properties with:
#
#   spring.datasource.url=jdbc:postgresql://...
#   spring.datasource.username=...
#   spring.datasource.password=...
#   spring.security.oauth2.resourceserver.jwt.issuer-uri=https://<project-ref>.supabase.co/auth/v1
#
# Option B — environment only:
#
#   SPRING_DATASOURCE_URL=...
#   SPRING_DATASOURCE_USERNAME=...
#   SPRING_DATASOURCE_PASSWORD=...
#   SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=https://<project-ref>.supabase.co/auth/v1

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
