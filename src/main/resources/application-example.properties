spring.datasource.url=jdbc:postgresql://<your-db-host>:6543/postgres
spring.datasource.username=<your-db-username>
spring.datasource.password=<your-db-password>
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
# Optional: usually not needed, Hibernate infers it from the URL
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Supabase Auth: validate JWTs via OIDC issuer (same project as your JWT "iss" claim).
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://<project-ref>.supabase.co/auth/v1
