# Local secrets: optional:file:./application-local.properties (repo root) and/or
# optional:classpath:application-local.properties (src/main/resources). Copy
# application-local.properties.example to application-local.properties in resources.
spring.config.import=optional:file:./application-local.properties,optional:classpath:application-local.properties

# Do not set spring.datasource.url here with empty defaults — that blocks Spring Boot's
# SPRING_DATASOURCE_* env binding. Use env vars or application-local.properties.
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate

# JWT issuer is not set here — an empty issuer-uri would make OAuth2 build a broken JwtDecoder.
# Set spring.security.oauth2.resourceserver.jwt.issuer-uri in application-local.properties,
# or set SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI (Spring Boot env binding).
# Production: application-prod.properties sets issuer from SUPABASE_ISSUER_URI.

# Comma-separated browser origins; default includes local frontend. Override via CORS_ALLOWED_ORIGINS in Railway.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
